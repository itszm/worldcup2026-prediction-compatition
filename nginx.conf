# Nginx 配置文件 (适用于多 Next.js 子应用的反向代理部署)
# 请将此内容应用或包含 (include) 到您的 Nginx 配置中 (通常在 /etc/nginx/sites-available/)

server {
    listen 80;
    server_name 2026.xfind.work; # 您的域名

    # 静态门户网站的根目录路径 (主页)
    root /home/ubuntu/apps/worldcup2026-prediction-compatition;
    index index.html;

    # 1. 访问主目录，直接提供 index.html 门户页面
    location / {
        try_files $uri $uri/ =404;
    }

    # ==================================================
    # 2. 子应用反向代理配置 (按路径重写并代理到对应端口)
    # ==================================================

    # Antigravity ( Gemini 3.5 Flash ) -> Port 3001
    location /antigravity/ {
        rewrite ^/antigravity/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3001;
        
        # 标准代理头设定
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 支持 Websocket / HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Claude Code ( Fable 5 ) -> Port 3002
    location /claude/ {
        rewrite ^/claude/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3002;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Codex ( GPT 5.5 ) -> Port 3003
    location /codex/ {
        rewrite ^/codex/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3003;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ==================================================
    # 3. 智能静态资源分流 (核心黑科技)
    # 由于子应用没有设置 basePath，它们会向根域名请求 /_next 资源。
    # 我们根据 HTTP Referer 头来智能判断并转发至对应的子服务端口。
    # ==================================================

    # Next.js 打包的系统资源文件
    location /_next/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        if ($http_referer ~* "/antigravity/") {
            proxy_pass http://127.0.0.1:3001;
        }
        if ($http_referer ~* "/claude/") {
            proxy_pass http://127.0.0.1:3002;
        }
        if ($http_referer ~* "/codex/") {
            proxy_pass http://127.0.0.1:3003;
        }
        
        # 默认分流回退
        proxy_pass http://127.0.0.1:3001;
    }

    # 子应用公共目录下的静态图片或媒体资源 (例如 globe.svg, vercel.svg)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|json)$ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        if ($http_referer ~* "/antigravity/") {
            proxy_pass http://127.0.0.1:3001;
        }
        if ($http_referer ~* "/claude/") {
            proxy_pass http://127.0.0.1:3002;
        }
        if ($http_referer ~* "/codex/") {
            proxy_pass http://127.0.0.1:3003;
        }
        
        # 如果不是子应用发起的，则尝试查找根目录下的静态资源
        try_files $uri =404;
    }
}
